<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time VMM Scanner - Auto Filter</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <style>
        body { background-color: #121212; color: #00ff00; font-family: 'Courier New', Courier, monospace; text-align: center; margin: 0; padding: 20px; }
        canvas { border: 2px solid #00ff00; background-color: #000; max-width: 100%; border-radius: 5px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .panel { background: #222; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: inline-block; border: 1px solid #333; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; margin: 5px; transition: 0.2s; }
        button:hover { background: #00cc00; }
        input { padding: 5px; width: 80px; text-align: center; background: #111; color: #00ff00; border: 1px solid #00ff00; }
        .status-box { margin-top: 10px; font-size: 0.9em; color: #aaa; }
        .legend { font-size: 0.8em; color: #fff; margin-top: 10px; text-align: left; display: inline-block; }
    </style>
</head>
<body>
    <h2>⚡ Alat Ukur Profil (Smart Filter)</h2>
    <div class="panel">
        <div>
            <label>Ukuran Benda Referensi (mm): </label>
            <input type="number" id="refSize" value="85.600" step="0.001">
        </div>
        <br>
        <button id="btnCalibrate">1. Kunci Kalibrasi (Set Skala)</button>
        <button id="btnReset" style="background: #ff4444; color: white;">Reset</button>
        <div class="status-box" id="status">Status: Menunggu Engine Computer Vision...</div>
        <div class="status-box" id="ppmDisplay" style="color: #00ff00; font-weight: bold;">Pixels Per mm (PPM): 0</div>
        
        <div class="legend">
            <b>Indikator Visual:</b><br>
            <span style="color: yellow;">■ Garis Kuning:</span> Lekukan kontur asli benda<br>
            <span style="color: #00ff00;">■ Kotak Hijau:</span> Panjang & Lebar maksimal<br>
            <span style="color: #0088ff;">■ Lingkaran Biru:</span> Area Diameter luar (Otomatis sembunyi untuk benda kotak)
        </div>
    </div>
    <br>
    
    <video id="videoInput" width="640" height="480" style="display:none;" autoplay playsinline></video>
    <canvas id="canvasOutput" width="640" height="480"></canvas>

    <script>
        let video = document.getElementById('videoInput');
        let canvas = document.getElementById('canvasOutput');
        let status = document.getElementById('status');
        let ppm = 0;
        let streaming = false;
        let src, dst, gray, edges, contours, hierarchy, cap;

        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 }, focusMode: "continuous" }, 
            audio: false 
        })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
        })
        .catch(function(err) {
            status.innerHTML = "❌ Gagal akses kamera.";
        });

        function onOpenCvReady() {
            status.innerHTML = "✅ Engine Siap. Arahkan ke benda referensi, lalu klik Kalibrasi.";
            
            src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            dst = new cv.Mat(video.height, video.width, cv.CV_8UC4);
            gray = new cv.Mat();
            edges = new cv.Mat();
            contours = new cv.MatVector();
            hierarchy = new cv.Mat();
            cap = new cv.VideoCapture(video);
            
            streaming = true;
            requestAnimationFrame(processVideo);
        }

        function processVideo() {
            if (!streaming) return;
            try {
                cap.read(src);
                src.copyTo(dst);
                
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                cv.Canny(gray, edges, 50, 150, 3, false);
                
                let M = cv.Mat.ones(3, 3, cv.CV_8U);
                cv.dilate(edges, edges, M, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());
                cv.erode(edges, edges, M, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());
                M.delete();

                cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    
                    if (area > 2000) { 
                        // 1. Gambar Kontur Asli (Garis Kuning)
                        let colorContour = new cv.Scalar(0, 255, 255, 255); 
                        let cntVec = new cv.MatVector();
                        cntVec.push_back(cnt);
                        cv.drawContours(dst, cntVec, 0, colorContour, 2, cv.LINE_8, hierarchy, 0);
                        cntVec.delete();

                        // 2. Dapatkan Bounding Box
                        let rect = cv.minAreaRect(cnt);
                        let box = cv.RotatedRect.points(rect);
                        let verticesBox = new cv.MatVector();
                        let matObj = cv.matFromArray(4, 1, cv.CV_32SC2, [
                            box[0].x, box[0].y, box[1].x, box[1].y,
                            box[2].x, box[2].y, box[3].x, box[3].y
                        ]);
                        verticesBox.push_back(matObj);
                        cv.polylines(dst, verticesBox, true, new cv.Scalar(0, 255, 0, 150), 1); 
                        matObj.delete(); verticesBox.delete();

                        // 3. Pendekatan Poligon untuk deteksi jumlah sudut
                        let approx = new cv.Mat();
                        let perimeter = cv.arcLength(cnt, true);
                        cv.approxPolyDP(cnt, approx, 0.02 * perimeter, true); 
                        let totalSudut = approx.rows; 
                        
                        // CEK: Apakah benda kotak/persegi? (4 Sudut)
                        let isKotak = (totalSudut === 4);

                        // 4. Lingkaran Luar (Hanya digambar jika BUKAN kotak)
                        let circle = cv.minEnclosingCircle(cnt);
                        if (!isKotak) {
                            cv.circle(dst, circle.center, circle.radius, new cv.Scalar(255, 0, 0, 150), 1);
                        }

                        // 5. Tampilkan Angka Ukuran JIKA sudah kalibrasi
                        if (ppm > 0) {
                            let w = (rect.size.width / ppm).toFixed(2);
                            let h = (rect.size.height / ppm).toFixed(2);
                            
                            let shapeText = "";
                            if (totalSudut === 3) shapeText = "Segitiga";
                            else if (totalSudut === 4) shapeText = "Persegi/Balok";
                            else if (totalSudut === 5) shapeText = "Segi-5 (Chamfer)";
                            else if (totalSudut > 8) shapeText = "Silinder/Bulat";
                            else shapeText = `Poligon ${totalSudut} Sudut`;

                            let textDim = `Dim: ${w} x ${h} mm`;
                            let textShape = `Profil: ${shapeText}`;
                            
                            // Atur posisi teks agar rapi (dinamis)
                            let yPosShape = box[1].y - 5;
                            let yPosDia = box[1].y - 25;
                            // Jika kotak, dimensi turun mengisi ruang kosong diameter
                            let yPosDim = !isKotak ? (box[1].y - 45) : (box[1].y - 25);
                            
                            cv.putText(dst, textShape, new cv.Point(box[1].x, yPosShape), cv.FONT_HERSHEY_SIMPLEX, 0.6, new cv.Scalar(0, 200, 255, 255), 2);
                            cv.putText(dst, textDim, new cv.Point(box[1].x, yPosDim), cv.FONT_HERSHEY_SIMPLEX, 0.6, new cv.Scalar(0, 255, 0, 255), 2);

                            // Munculkan teks diameter HANYA jika bukan kotak
                            if (!isKotak) {
                                let radiusMM = (circle.radius / ppm).toFixed(2);
                                let diameterMM = (radiusMM * 2).toFixed(2);
                                let textDia = `Dia: ${diameterMM} (R${radiusMM})`;
                                cv.putText(dst, textDia, new cv.Point(box[1].x, yPosDia), cv.FONT_HERSHEY_SIMPLEX, 0.6, new cv.Scalar(255, 200, 0, 255), 2);
                            }
                        }
                        approx.delete();
                    }
                }
                
                cv.imshow('canvasOutput', dst);
                requestAnimationFrame(processVideo); 
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('btnCalibrate').addEventListener('click', () => {
            if (contours && contours.size() > 0) {
                let maxArea = 0;
                let maxCnt = null;
                
                for (let i = 0; i < contours.size(); i++) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > maxArea) {
                        maxArea = area;
                        maxCnt = cnt;
                    }
                }
                
                if (maxCnt) {
                    let rect = cv.minAreaRect(maxCnt);
                    let pixelDim = Math.max(rect.size.width, rect.size.height);
                    let realDim = parseFloat(document.getElementById('refSize').value);
                    
                    ppm = pixelDim / realDim; 
                    document.getElementById('ppmDisplay').innerHTML = `Pixels Per mm (PPM): ${ppm.toFixed(5)}`;
                    status.innerHTML = "✅ Kalibrasi Terkunci. Masukkan benda kerja!";
                }
            } else {
                alert("Benda referensi tidak terdeteksi!");
            }
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            ppm = 0;
            document.getElementById('ppmDisplay').innerHTML = `Pixels Per mm (PPM): 0`;
            status.innerHTML = "🔄 Reset berhasil. Silakan kalibrasi ulang.";
        });

        let checkOpenCV = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                clearInterval(checkOpenCV);
                onOpenCvReady();
            }
        }, 500);
    </script>
</body>
</html>
