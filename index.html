<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Precision Measure 0.001</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 0; }
        .header { background: #1a1a1a; padding: 10px; border-bottom: 2px solid #00ff00; }
        .header h3 { margin: 0; color: #00ff00; }
        
        .container { position: relative; width: 100%; max-width: 640px; margin: 15px auto; }
        video { display: none; }
        canvas { width: 100%; border: 1px solid #333; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,255,0,0.1); }
        
        .panel { background: #1e1e1e; max-width: 600px; margin: 10px auto; padding: 15px; border-radius: 8px; text-align: left; border-left: 4px solid #00ff00; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .data-box { background: #2a2a2a; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 16px; }
        .data-box span { color: #00ff00; font-weight: bold; font-size: 18px; float: right; }
        
        .controls { margin-top: 15px; text-align: center; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; background: #00ff00; color: #000; border: none; border-radius: 5px; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .btn-reset { background: #ff4444; color: white; }
        
        #status { font-size: 14px; color: #aaa; margin-bottom: 10px; text-align: center; }
        #shape-type { font-weight: bold; color: #00ffff; text-align: center; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h3>📏 PRECISION MEASURE (GEOMETRY MODE)</h3>
    </div>
    
    <div class="container">
        <video id="videoInput" width="640" height="480" autoplay muted playsinline></video>
        <canvas id="canvasOutput" width="640" height="480"></canvas>
    </div>

    <div class="panel">
        <div id="status">⏳ Memuat Engine OpenCV...</div>
        <span id="shape-type">Deteksi Bentuk: Menunggu Objek...</span>
        
        <div class="data-grid">
            <div class="data-box">Panjang (P): <span id="val-p">0.000</span></div>
            <div class="data-box">Lebar (L): <span id="val-l">0.000</span></div>
            <div class="data-box">Diameter (D): <span id="val-d">0.000</span></div>
            <div class="data-box">Radius (R): <span id="val-r">0.000</span></div>
            <div class="data-box" style="grid-column: span 2;">Status Chamfer: <span id="val-c" style="color: #ffaa00;">Tidak Terdeteksi</span></div>
        </div>

        <div class="controls">
            <button id="startBtn" disabled onclick="initApp()">Mulai Kamera</button>
            <button class="btn-reset" onclick="resetSkala()">Reset Skala</button>
        </div>
    </div>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="cvReady()"></script>

    <script>
        let video = document.getElementById('videoInput');
        let ppm = null; 
        let src, gray, edge, contours, hierarchy, cap;

        function cvReady() {
            document.getElementById('status').innerText = "✅ Engine Siap! Klik 'Mulai Kamera'.";
            document.getElementById('startBtn').disabled = false;
        }

        async function initApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: 640, height: 480 } 
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('status').innerText = "📷 Kamera aktif. Letakkan referensi (85.6mm) untuk kalibrasi.";
                    
                    src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                    gray = new cv.Mat();
                    edge = new cv.Mat();
                    contours = new cv.MatVector();
                    hierarchy = new cv.Mat();
                    cap = new cv.VideoCapture(video);
                    
                    processFrame();
                };
            } catch (err) {
                document.getElementById('status').innerText = "❌ Error: Akses kamera ditolak.";
            }
        }

        function resetSkala() {
            ppm = null;
            document.getElementById('status').innerText = "🔄 Skala direset. Letakkan kembali benda referensi.";
            document.getElementById('shape-type').innerText = "Deteksi Bentuk: Menunggu Objek...";
            document.getElementById('val-p').innerText = "0.000";
            document.getElementById('val-l').innerText = "0.000";
            document.getElementById('val-d').innerText = "0.000";
            document.getElementById('val-r').innerText = "0.000";
            document.getElementById('val-c').innerText = "Tidak Terdeteksi";
            document.getElementById('val-c').style.color = "#ffaa00";
        }

        function processFrame() {
            try {
                cap.read(src);
                
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0);
                cv.Canny(gray, edge, 50, 150, 3, false);
                
                cv.findContours(edge, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                let largestArea = 0;
                let bestContourIndex = -1;

                // 1. Cari objek terbesar
                for (let i = 0; i < contours.size(); ++i) {
                    let area = cv.contourArea(contours.get(i));
                    if (area > 3000 && area > largestArea) {
                        largestArea = area;
                        bestContourIndex = i;
                    }
                }

                if (bestContourIndex !== -1) {
                    let cnt = contours.get(bestContourIndex);
                    
                    // 2. Analisis Geometri & Bentuk
                    let perimeter = cv.arcLength(cnt, true);
                    if (perimeter > 0) {
                        // Rumus Circularity untuk menentukan lingkaran
                        let circularity = (4 * Math.PI * largestArea) / (perimeter * perimeter);
                        let isCircle = circularity > 0.82; // Toleransi 0.82 untuk garis Canny yang agak kasar

                        // Hitung Kotak (Untuk Panjang Lebar)
                        let rect = cv.minAreaRect(cnt);
                        let vertices = cv.RotatedRect.points(rect);
                        let side1 = Math.hypot(vertices[0].x - vertices[1].x, vertices[0].y - vertices[1].y);
                        let side2 = Math.hypot(vertices[1].x - vertices[2].x, vertices[1].y - vertices[2].y);
                        let pjgPx = Math.max(side1, side2);
                        let lbrPx = Math.min(side1, side2);

                        // Hitung Lingkaran (Untuk Diameter Radius)
                        let circle = cv.minEnclosingCircle(cnt);
                        let diaPx = circle.radius * 2;

                        // Deteksi Chamfer (Aproksimasi Poligon)
                        let approx = new cv.Mat();
                        let epsilon = 0.015 * perimeter; // Dipertajam: 1.5% dari keliling
                        cv.approxPolyDP(cnt, approx, epsilon, true);
                        let vCount = approx.rows;
                        // Jika bukan lingkaran, dan titik sudut ada 5 sampai 8, berarti ujungnya terpotong (Chamfer)
                        let isChamfered = (!isCircle && vCount >= 5 && vCount <= 8);
                        approx.delete();

                        // --- KALIBRASI OTOMATIS ---
                        if (ppm === null) {
                            ppm = pjgPx / 85.6; 
                            document.getElementById('status').innerText = "✅ Skala Terkalibrasi! Singkirkan referensi dan ukur target.";
                        }

                        // --- KONVERSI & TAMPILKAN HASIL ---
                        let pjgMm = (pjgPx / ppm).toFixed(3);
                        let lbrMm = (lbrPx / ppm).toFixed(3);
                        let diaMm = (diaPx / ppm).toFixed(3);
                        let radMm = (circle.radius / ppm).toFixed(3);

                        let shapeText = "";

                        if (isCircle) {
                            shapeText = "Terdeteksi: Benda Lingkaran / Silinder";
                            document.getElementById('val-d').innerText = diaMm;
                            document.getElementById('val-r').innerText = radMm;
                            document.getElementById('val-p').innerText = "-";
                            document.getElementById('val-l').innerText = "-";
                            document.getElementById('val-c').innerText = "Tidak Berlaku";
                            document.getElementById('val-c').style.color = "#888";
                            
                            // Gambar lingkaran di layar
                            cv.circle(edge, circle.center, circle.radius, [255, 255, 255, 255], 2);
                        } else {
                            shapeText = "Terdeteksi: Benda Persegi / Balok";
                            document.getElementById('val-p').innerText = pjgMm;
                            document.getElementById('val-l').innerText = lbrMm;
                            document.getElementById('val-d').innerText = "-";
                            document.getElementById('val-r').innerText = "-";
                            
                            // Gambar garis kotak di layar
                            for (let j = 0; j < 4; j++) {
                                let p1 = new cv.Point(vertices[j].x, vertices[j].y);
                                let p2 = new cv.Point(vertices[(j + 1) % 4].x, vertices[(j + 1) % 4].y);
                                cv.line(edge, p1, p2, [255, 255, 255, 255], 2);
                            }

                            if (isChamfered) {
                                shapeText += " (Dengan Chamfer)";
                                document.getElementById('val-c').innerText = "Terdeteksi (" + vCount + " Sudut)";
                                document.getElementById('val-c').style.color = "#00ff00";
                            } else {
                                document.getElementById('val-c').innerText = "Tidak Terdeteksi (Sudut Tajam)";
                                document.getElementById('val-c').style.color = "#ffaa00";
                            }
                        }
                        
                        document.getElementById('shape-type').innerText = shapeText;
                    }
                }

                cv.imshow('canvasOutput', edge);
                requestAnimationFrame(processFrame);
            } catch (err) {
                console.error("Frame error:", err);
                requestAnimationFrame(processFrame);
            }
        }
    </script>
</body>
</html>
