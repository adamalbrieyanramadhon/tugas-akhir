<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Test - Kamera</title>
    <style>
        body { text-align: center; font-family: Arial; padding: 20px; background: #222; color: white; }
        video { width: 100%; max-width: 500px; border: 4px solid red; border-radius: 10px; }
        .pesan { margin-top: 20px; font-weight: bold; padding: 10px; background: #444; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Tes Kamera Sistem</h2>
    <video id="videoElement" autoplay playsinline></video>
    <div class="pesan" id="statusPesan">Menunggu izin kamera...</div>

    <script>
        const video = document.getElementById('videoElement');
        const statusPesan = document.getElementById('statusPesan');

        // Meminta akses kamera (Kamera apa saja yang tersedia, depan atau belakang)
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(function(stream) {
                video.srcObject = stream;
                statusPesan.innerHTML = "✅ BERHASIL! Kamera menyala.";
                statusPesan.style.color = "#00ff00";
                video.style.borderColor = "#00ff00"; // Bingkai jadi hijau
            })
            .catch(function(error) {
                // Menangkap pesan error dari browser
                statusPesan.innerHTML = "❌ GAGAL: " + error.message;
                statusPesan.style.color = "#ff4444";
            });
    </script>

</body>
</html>
