<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Measure AI</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        .wrapper { position: relative; display: inline-block; margin-top: 20px; }
        video, canvas { border: 2px solid #00ff00; border-radius: 8px; }
        canvas { position: absolute; top: 0; left: 0; }
        .controls { margin-top: 20px; padding: 15px; background: #333; }
        button { padding: 10px 20px; cursor: pointer; background: #00ff00; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Alat Ukur Presisi (OpenCV.js)</h2>
    <div class="wrapper">
        <video id="videoInput" width="640" height="480" autoplay muted playsinline></video>
        <canvas id="canvasOutput" width="640" height="480"></canvas>
    </div>

    <div class="controls">
        <p id="status">Memuat OpenCV.js...</p>
        <button id="startBtn" disabled onclick="startProcessing()">Mulai Deteksi</button>
    </div>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>

    <script>
        let video = document.getElementById('videoInput');
        let src, dst, cap;

        function onOpenCvReady() {
            document.getElementById('status').innerText = "OpenCV siap! Izinkan kamera.";
            document.getElementById('startBtn').disabled = false;
        }

        async function startProcessing() {
            // Akses Kamera
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
                dst = new cv.Mat(video.height, video.width, cv.CV_8UC1);
                cap = new cv.VideoCapture(video);
                processFrame();
            };
        }

        function processFrame() {
            try {
                cap.read(src);
                cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
                
                // Gunakan Gaussian Blur untuk mengurangi noise agar presisi meningkat
                let ksize = new cv.Size(5, 5);
                cv.GaussianBlur(dst, dst, ksize, 0, 0, cv.BORDER_DEFAULT);
                
                // Canny Edge Detection
                cv.Canny(dst, dst, 50, 150, 3, false);
                
                cv.imshow('canvasOutput', dst);
                requestAnimationFrame(processFrame);
            } catch (err) {
                console.error("Frame processing error:", err);
            }
        }
    </script>
</body>
</html>
